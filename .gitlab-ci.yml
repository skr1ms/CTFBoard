workflow:
  rules:
    - changes:
        - backend/**/*
        - frontend/**/*
        - go.mod
        - go.sum
      when: always
    
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

stages:
  - build
  - test
  - deploy
  - cleanup

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_CLI_IMAGE: docker:cli
  
  GOLANG_IMAGE: golang:alpine
  # For PostgreSQL: change to POSTGRES_IMAGE: postgres:latest
  # and update POSTGRES_* variables below (but tests still use MariaDB)
  MARIADB_IMAGE: mariadb:latest
  
  MARIADB_ROOT_PASSWORD: root
  MARIADB_DATABASE: test_board
  MARIADB_USER: test_user
  MARIADB_PASSWORD: test_password

.docker-login: &docker_login
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin

# ---------------------------------------------------------------------------
# Build stage
# ---------------------------------------------------------------------------
build:backend:
  stage: build
  image: $DOCKER_CLI_IMAGE
  <<: *docker_login
  script:
    - docker pull "$CI_REGISTRY_IMAGE/backend:latest" || true
    - |
      docker build \
        --cache-from "$CI_REGISTRY_IMAGE/backend:latest" \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA" \
        -t "$CI_REGISTRY_IMAGE/backend:latest" \
        -f backend/Dockerfile \
        backend/
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/backend:latest"
  rules:
    - changes:
        - backend/**/*
        - go.mod
        - go.sum
        - deployment/docker/**/*
      when: always

# --- TEST STAGE ---
# Note: Tests always use MariaDB regardless of production database choice
# If using PostgreSQL in production, tests still run on MariaDB (SQL logic is the same)
test:backend:
  stage: test
  image: $GOLANG_IMAGE
  services:
    - name: $MARIADB_IMAGE
      alias: mariadb
      variables:
        MARIADB_ROOT_PASSWORD: $MARIADB_ROOT_PASSWORD
        MARIADB_DATABASE: $MARIADB_DATABASE
        MARIADB_USER: $MARIADB_USER
        MARIADB_PASSWORD: $MARIADB_PASSWORD
  variables:
    MARIADB_HOST: mariadb
    MARIADB_PORT: "3306"
    MARIADB_USER: $MARIADB_USER
    MARIADB_PASSWORD: $MARIADB_PASSWORD
    MARIADB_DB: $MARIADB_DATABASE
    MARIADB_ROOT_PASSWORD: $MARIADB_ROOT_PASSWORD
    JWT_ACCESS_SECRET: test-access-secret-key-for-ci
    JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
    APP_NAME: CTFBoard
    APP_VERSION: 1.0.0
    CHI_MODE: test
    LOG_LEVEL: info
    BACKEND_PORT: "8080"
    MIGRATIONS_PATH: migrations
    CGO_ENABLED: "0"
  before_script:
    - apk add --no-cache build-base git netcat-openbsd
    
    - |
      echo "Waiting for MariaDB..."
      for i in $(seq 1 30); do
        nc -z mariadb 3306 && echo "MariaDB is ready!" && break
        echo "Waiting..."
        sleep 2
      done
      
    - cd backend
    - go mod download
  script:
    - go test ./... -v
  rules:
    - changes:
        - backend/**/*
        - go.mod
        - go.sum
      when: always

# ---------------------------------------------------------------------------
# Deploy stage
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_SERVER_IP" >> ~/.ssh/known_hosts || true
    - ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 $DEPLOY_USER@$DEPLOY_SERVER_IP "echo 'SSH connection test'" || true
  script:
    - |
      ssh -o StrictHostKeyChecking=accept-new $DEPLOY_USER@$DEPLOY_SERVER_IP "bash -s" << EOF
        set -e
        cd ~/ctfboard
        
        git fetch origin main
        git reset --hard origin/main
        
        echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
        
        COMPOSE_FILE="deployment/docker/docker-compose.yml"
        ENV_FILE=".env"
        
        if [ -z "\$ENV_FILE" ]; then
          ENV_FILE=".env"
        fi
        
        touch "\$ENV_FILE"
        
        sed -i '/^BACKEND_IMAGE=/d' "\$ENV_FILE" || true
        
        echo "BACKEND_IMAGE=$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA" >> "\$ENV_FILE"
        
        docker compose --env-file "\$ENV_FILE" -f "\$COMPOSE_FILE" pull backend
        
        docker compose --env-file "\$ENV_FILE" -f "\$COMPOSE_FILE" up -d backend
        
        docker compose --env-file "\$ENV_FILE" -f "\$COMPOSE_FILE" restart promtail || true
        
        docker logout || true
        rm -f ~/.docker/config.json || true
        
        docker image prune -f
      EOF
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ---------------------------------------------------------------------------
# Cleanup stage
# ---------------------------------------------------------------------------
docker:gc:
  stage: cleanup
  image: $DOCKER_CLI_IMAGE
  script:
    - docker image prune -f || true
  rules:
    - when: always
  allow_failure: true
